<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lethe Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 384px; font-family: system-ui, -apple-system, sans-serif; padding: 24px; }
      @media (prefers-color-scheme: dark) {
        body { background: #111827; color: #f3f4f6; }
        input { background: #1f2937; color: #f3f4f6; border-color: #4b5563; }
        .hint { color: #6b7280; }
        button { background: #2563eb; }
      }
      h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
      .field { margin-bottom: 16px; }
      label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
      input {
        width: 100%; padding: 8px 12px; font-size: 13px;
        border: 1px solid #d1d5db; border-radius: 6px; background: #f9fafb;
      }
      .hint { font-size: 12px; color: #6b7280; margin-top: 4px; }
      button {
        width: 100%; padding: 10px; font-size: 14px; font-weight: 600;
        background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/options/main.tsx"></script>
  </body>
</html>
